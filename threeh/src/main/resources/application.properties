spring.application.name=threeh

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=none
spring.devtools.restart.enabled=true

#Toss Payment
payment.toss.test_client_api_key=test_ck_4yKeq5bgrpKLdW2mBbdBVGX0lzW6
payment.toss.test_secrete_api_key=test_sk_26DlbXAaV0dqqGlRkRXbVqY50Q9R
payment.toss.success_url=http://localhost:3000/payment/toss/success
payment.toss.fail_url=http://localhost:3000/payment/toss/fail

#(Server-side) Session 저장소 Config
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always


#hikari 설정


spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

spring.datasource.hikari.data-source-properties.oracle.net.keepAlive=true
spring.datasource.hikari.data-source-properties.oracle.jdbc.fanEnabled=false
spring.datasource.hikari.data-source-properties.oracle.net.CONNECT_TIMEOUT=30000
spring.datasource.hikari.data-source-properties.oracle.jdbc.ReadTimeout=30000

logging.level.com.zaxxer.hikari=DEBUG


#기본 프로파일을 local
spring.profiles.active=local
#application-oauth.properties를 읽어옴
spring.profiles.include=oauth




